# Example project.yaml — ChatBI MCP Server 项目配置模板
# 复制到 projects/{project_id}/project.yaml 并根据业务修改

id: example
name: 示例项目
project_type: behavior_analysis

data_source:
  files: []
  format: csv

semantic_layer:
  table: events

  event_definitions:
    page_view:
      business_name: 页面浏览
      description: 用户浏览页面
      category: 页面
      aliases:
        - 浏览
    button_click:
      business_name: 按钮点击
      description: 用户点击按钮
      category: 交互
      aliases:
        - 点击

  columns:
    user_id:
      business_name: 用户ID
      type: string
      role: dimension
      description: 唯一用户标识
    event_name:
      business_name: 事件名称
      type: string
      role: dimension
      description: 事件类型标识
    event_date:
      business_name: 日期
      type: date
      role: dimension
      derived: true
      derived_from: timestamp
      derivation_logic: CAST(timestamp AS DATE)
      description: 事件发生日期

  metrics:
    dau:
      business_name: 日活用户
      sql: COUNT(DISTINCT user_id)
      keywords:
        - 日活
        - DAU
      description: 按天去重统计用户数
    total_events:
      business_name: 总事件数
      sql: COUNT(*)
      keywords:
        - 事件数
        - 总事件
      description: 事件总数
