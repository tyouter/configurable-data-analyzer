- filename: rednote KPI definition_20260323.xlsx
  category: reference_kpi
  kpi_definitions:
  - name: 首次使用 AI 生成路书客户数量 日、周、月（功能上线 / 推广期重点统计）
    formula: ''
    description: '[事件: 如何定义首次？历史上第一条记录吗？-Y\n如何定义用户？设备？--看userid] 完成首次 AI 路书生成的用户数量之和'
  - name: APP 人均打开次数
    formula: ''
    description: '[事件: 总次数就是总共几条数据？ -Y\n人当分母] 统计周期内所有用户的 APP 打开次数总和（每天最多记为1次）'
  - name: APP 活跃率
    formula: ''
    description: '[事件: 除以总用户数量] 特定统计周期内'
  - name: APP第 n 日留存率
    formula: ''
    description: '[事件: 再乘以 100% 得到百分比（活跃定义为符合发现页或 Porsche + ... 起点日如何计算？--每天活跃的\n如何定义新用户？\n每天活跃的用户为base]
      在第 n 日仍保持活跃的用户数量'
  - name: Porsche + 版块活跃率
    formula: ''
    description: '[事件: 除以该周期内 APP 的总活跃用户数量] 统计周期内'
  - name: Porsche + 页面平均时长
    formula: ''
    description: '[事件: 除以该周期内 Porsche + 页面的访问会话总次数] 统计周期内'
  - name: Porsche + 页面人均打开次数
    formula: ''
    description: '[事件: 除以该周期内 APP 的总活跃用户数量] 统计周期内'
  - name: 发现板块活跃率
    formula: ''
    description: '[事件: 除以该周期内 APP 的总活跃用户数量] 统计周期内'
  - name: 发现页面平均时长
    formula: ''
    description: '[事件: 除以该周期内发现页面的访问会话总次数] 统计周期内'
  - name: 发现页面人均打开次数
    formula: ''
    description: '[事件: 除以该周期内 APP 的总活跃用户数量] 统计周期内'
  - name: AI 路书生成活跃率
    formula: ''
    description: '[事件: 是否只看点击就行？\n\n] 分子是点击的用户数\n分母是app的活跃用户数（同APP活跃率中的相关计算）'
  - name: AI 路书生成人均使用次数
    formula: ''
    description: '[事件: 除以该周期内 APP 的AI 路书 “生成” 事件用户数量] 统计周期内'
  - name: AI 路书生成使用率
    formula: ''
    description: '[事件: 除以该周期内 APP 的总使用次数（APP 打开次数总和（每天最多记为1次））] 统计周期内'
  - name: 分享码生成占比
    formula: ''
    description: '[事件: 除以该周期内 APP 的总活跃用户数量] 统计周期内'
  - name: 分享码使用占比
    formula: ''
    description: '[事件: 除以该周期内 APP 的总活跃用户数量] 统计周期内'
