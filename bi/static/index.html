<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rednote BI</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242734;
    --border: #2e3144;
    --text: #e4e6f0;
    --text2: #9ca0b0;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --green: #00b894;
    --red: #e17055;
    --blue: #0984e3;
    --orange: #fdcb6e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header h1 span { color: var(--accent); }
  .header .meta { font-size: 13px; color: var(--text2); }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Chat panel */
  .chat-panel { width: 380px; min-width: 320px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; }
  .chat-msg { margin-bottom: 16px; }
  .chat-msg .role { font-size: 11px; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
  .chat-msg .role.user { color: var(--accent); }
  .chat-msg .role.ai { color: var(--green); }
  .chat-msg .content { font-size: 14px; line-height: 1.5; color: var(--text); }
  .chat-msg pre { background: var(--surface2); padding: 8px 12px; border-radius: 6px; font-size: 12px; overflow-x: auto; margin: 8px 0; color: var(--text2); }
  .chat-msg .pin-btn { display: inline-block; margin-top: 8px; padding: 4px 12px; background: var(--accent); color: #fff; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; }
  .chat-msg .pin-btn:hover { background: var(--accent2); }

  /* Quick metrics */
  .quick-metrics { padding: 12px 16px; border-top: 1px solid var(--border); }
  .quick-metrics label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 6px; }
  .quick-metrics .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .quick-metrics .tag { padding: 4px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; font-size: 12px; cursor: pointer; color: var(--text2); transition: all 0.2s; }
  .quick-metrics .tag:hover { border-color: var(--accent); color: var(--accent); background: rgba(108,92,231,0.1); }

  /* Input area */
  .chat-input { display: flex; padding: 12px 16px; border-top: 1px solid var(--border); gap: 8px; }
  .chat-input input { flex: 1; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
  .chat-input input:focus { border-color: var(--accent); }
  .chat-input button { padding: 10px 20px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; }
  .chat-input button:hover { background: var(--accent2); }
  .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Dashboard area */
  .dashboard-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .dashboard-tabs { display: flex; align-items: center; padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border); gap: 8px; overflow-x: auto; }
  #dashTabs { display: flex; gap: 8px; }
  .dashboard-tabs .tab { padding: 6px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; font-size: 13px; cursor: pointer; color: var(--text2); }
  .dashboard-tabs .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .dashboard-tabs .tab-new { padding: 6px 10px; background: transparent; border: 1px dashed var(--border); border-radius: 6px; font-size: 13px; cursor: pointer; color: var(--text2); }
  .dashboard-tabs .tab-new:hover { border-color: var(--accent); color: var(--accent); }

  /* Chart grid */
  .chart-grid {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
    grid-auto-rows: auto;
    gap: 16px;
    align-content: start;
  }
  .chart-grid.empty { display: flex; align-items: center; justify-content: center; }
  .empty-state { text-align: center; color: var(--text2); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state p { font-size: 14px; }

  /* Chart card */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    height: 400px;
    min-height: 400px;
    display: flex;
    flex-direction: column;
  }
  .chart-card .chart-container { width: 100%; flex: 1; min-height: 0; }
  .chart-card.wide {
    grid-column: 1 / -1;
    height: 420px;
    min-height: 420px;
  }
  .chart-card .card-footer { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-top: 1px solid var(--border); }
  .chart-card .card-footer .summary { font-size: 12px; color: var(--text2); flex: 1; }
  .chart-card .card-footer .actions { display: flex; gap: 6px; }
  .chart-card .card-footer .actions button { padding: 4px 10px; font-size: 11px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); border-radius: 4px; cursor: pointer; }
  .chart-card .card-footer .actions button:hover { border-color: var(--accent); color: var(--accent); }
  .chart-card .card-footer .actions button.danger:hover { border-color: var(--red); color: var(--red); }
  .chart-card .table-container { padding: 12px; flex: 1; min-height: 0; overflow: auto; }
  .chart-card .table-container table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .chart-card .table-container th { text-align: left; padding: 6px 10px; background: var(--surface2); color: var(--text2); font-weight: 500; position: sticky; top: 0; }
  .chart-card .table-container td { padding: 6px 10px; border-bottom: 1px solid var(--border); }

  /* Audit modal */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 640px; max-height: 80vh; overflow-y: auto; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .modal-header h2 { font-size: 16px; }
  .modal-header button { background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; }
  .modal-body { padding: 20px; }
  .modal-body .audit-section { margin-bottom: 20px; }
  .modal-body .audit-section h3 { font-size: 13px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .modal-body .audit-section .info-grid { display: grid; grid-template-columns: 120px 1fr; gap: 4px 12px; font-size: 13px; }
  .modal-body .audit-section .info-grid .label { color: var(--text2); }
  .modal-body .audit-section pre { background: var(--surface2); padding: 10px 14px; border-radius: 6px; font-size: 12px; overflow-x: auto; color: var(--green); white-space: pre-wrap; }
  .modal-body .audit-section table { width: 100%; font-size: 12px; border-collapse: collapse; }
  .modal-body .audit-section th { text-align: left; padding: 4px 8px; background: var(--surface2); color: var(--text2); }
  .modal-body .audit-section td { padding: 4px 8px; border-bottom: 1px solid var(--border); }

  /* Context menu */
  .context-menu { display: none; position: fixed; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; z-index: 999; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .context-menu.show { display: block; }
  .context-menu .menu-item { padding: 8px 16px; font-size: 13px; cursor: pointer; color: var(--text); }
  .context-menu .menu-item:hover { background: var(--surface2); color: var(--accent); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text2); }

  /* Loading spinner */
  .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top: 2px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1><span>Rednote</span> BI</h1>
  <div class="meta" id="headerMeta">Loading...</div>
</div>

<div class="main">
  <!-- Chat Panel -->
  <div class="chat-panel">
    <div class="chat-messages" id="chatMessages">
      <div class="chat-msg">
        <div class="role ai">AI</div>
        <div class="content">欢迎使用 Rednote BI！你可以用自然语言提问，比如「每天的日活趋势」「各页面访问占比」</div>
      </div>
    </div>
    <div class="quick-metrics">
      <label>快捷指标</label>
      <div class="tags" id="quickTags">
        <span class="tag" data-q="每天的日活趋势">DAU趋势</span>
        <span class="tag" data-q="各页面模块的事件占比">页面占比</span>
        <span class="tag" data-q="每小时用户活跃分布">时段分布</span>
        <span class="tag" data-q="导航漏斗：浏览POI → 点击导航 → 确认导航">导航漏斗</span>
        <span class="tag" data-q="Top 10 热门事件">热门事件</span>
        <span class="tag" data-q="搜索关键词相关的用户行为">搜索行为</span>
      </div>
    </div>
    <div class="chat-input">
      <input type="text" id="queryInput" placeholder="输入你的问题..." autofocus />
      <button id="sendBtn" onclick="sendQuery()">发送</button>
    </div>
  </div>

  <!-- Dashboard Area -->
  <div class="dashboard-area">
    <div class="dashboard-tabs">
      <div class="tab active" data-dash="temp" onclick="switchTab('temp')">临时结果</div>
      <div id="dashTabs"></div>
      <div class="tab-new" onclick="createDashboard()">+ 新建 Dashboard</div>
    </div>
    <div class="chart-grid empty" id="chartGrid">
      <div class="empty-state">
        <div class="icon">📊</div>
        <p>在左侧输入问题或点击快捷指标<br>图表将显示在这里</p>
      </div>
    </div>
  </div>
</div>

<!-- Audit Modal -->
<div class="modal-overlay" id="auditModal">
  <div class="modal">
    <div class="modal-header">
      <h2>图表审计</h2>
      <button onclick="closeAudit()">&times;</button>
    </div>
    <div class="modal-body" id="auditBody"></div>
  </div>
</div>

<!-- Context Menu -->
<div class="context-menu" id="contextMenu">
  <div class="menu-item" onclick="showAuditFromContext()">审计详情</div>
</div>

<script>
// --- State ---
let currentTab = 'temp';
const TEMP_DASHBOARD = '__temp__';
let dashboards = {};
let contextAudit = null;
let contextCard = null;
let chartInstances = {};
let tempDashboardId = null; // server-side id for temp dashboard

// --- Init ---
document.addEventListener('DOMContentLoaded', async () => {
  loadDashboards();
  document.getElementById('queryInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendQuery();
  });
  document.querySelectorAll('.quick-metrics .tag').forEach(tag => {
    tag.addEventListener('click', () => {
      document.getElementById('queryInput').value = tag.dataset.q;
      sendQuery();
    });
  });
  document.addEventListener('click', () => {
    document.getElementById('contextMenu').classList.remove('show');
  });

  // Fetch meta
  try {
    const r = await fetch('/api/schema');
    const d = await r.json();
    const m = d.meta;
    document.getElementById('headerMeta').textContent =
      `${m.total_rows?.toLocaleString()} 事件 · ${m.total_users?.toLocaleString()} 用户 · ${m.event_types} 事件类型 · ${m.date_range?.[0]} ~ ${m.date_range?.[1]}`;
  } catch(e) {
    document.getElementById('headerMeta').textContent = 'Connected';
  }
});

// --- Query ---
async function sendQuery() {
  const input = document.getElementById('queryInput');
  const question = input.value.trim();
  if (!question) return;
  input.value = '';

  addChatMsg('user', question);
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span>';

  try {
    const r = await fetch('/api/query', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question})
    });
    const result = await r.json();

    if (result.error) {
      addChatMsg('ai', `查询失败: ${result.error}`);
    } else {
      addChatMsg('ai', result.summary || '查询完成', result.sql, result);
    }
  } catch(e) {
    addChatMsg('ai', `请求失败: ${e.message}`);
  }

  btn.disabled = false;
  btn.textContent = '发送';
}

function addChatMsg(role, text, sql, result) {
  const div = document.createElement('div');
  div.className = 'chat-msg';
  let html = `<div class="role ${role}">${role === 'user' ? '你' : 'AI'}</div>`;
  html += `<div class="content">${escapeHtml(text)}</div>`;
  if (sql) {
    html += `<pre>${escapeHtml(sql)}</pre>`;
  }
  if (result && result.chart_option) {
    const btnId = 'pin-' + Date.now();
    html += `<button class="pin-btn" id="${btnId}" onclick="pinChart(this)" data-result='${escapeAttr(JSON.stringify(result))}'>Pin 到 Dashboard</button>`;
  }
  div.innerHTML = html;
  document.getElementById('chatMessages').appendChild(div);
  div.scrollIntoView({behavior: 'smooth'});

  // Auto-persist and render in temp area
  if (result && result.chart_option) {
    persistChart(TEMP_DASHBOARD, result, (savedData) => {
      // After persist, re-render temp to pick up the chartId
      if (currentTab === 'temp') {
        const cards = document.querySelectorAll('#chartGrid .chart-card');
        if (cards.length > 0) cards[0].__chartId = savedData.chart_id;
      }
    });
    renderChart(result, 'temp');
  } else if (result && result.chart_type === 'table' && result.data?.length > 0) {
    persistChart(TEMP_DASHBOARD, result, (savedData) => {
      if (currentTab === 'temp') {
        const cards = document.querySelectorAll('#chartGrid .chart-card');
        if (cards.length > 0) cards[0].__chartId = savedData.chart_id;
      }
    });
    renderTable(result, 'temp');
  }
}

// --- Chart Rendering ---
function renderChart(result, tabId, chartId) {
  const grid = document.getElementById('chartGrid');
  if (currentTab !== tabId) return;

  // Remove empty state
  grid.classList.remove('empty');
  const emptyEl = grid.querySelector('.empty-state');
  if (emptyEl) emptyEl.remove();

  const cardId = 'chart-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);
  const card = document.createElement('div');
  const isWide = ['funnel','pie','sankey'].includes(result.chart_type);
  card.className = 'chart-card' + (isWide ? ' wide' : '');
  card.dataset.audit = escapeAttr(JSON.stringify(result.audit || {}));

  const containerId = cardId + '-container';
  card.innerHTML = `
    <div class="chart-container" id="${containerId}"></div>
    <div class="card-footer">
      <div class="summary">${escapeHtml(result.summary || '')}</div>
      <div class="actions">
        <button onclick="showAuditFromCard(this)">审计</button>
        <button onclick="pinFromCard(this)">Pin</button>
        <button class="danger" onclick="removeCard(this)">删除</button>
      </div>
    </div>
  `;

  grid.prepend(card);

  // Store full chart data on the card for pin/delete
  card.__chartData = result;
  card.__chartId = chartId || null;

  // Bind context menu
  card.addEventListener('contextmenu', e => {
    e.preventDefault();
    contextAudit = card.__chartData?.audit || null;
    contextCard = card;
    const menu = document.getElementById('contextMenu');
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
    menu.classList.add('show');
  });

  // Init ECharts — wait for DOM layout to complete
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const dom = document.getElementById(containerId);
      if (!dom) return;
      const w = dom.clientWidth || 400;
      const h = dom.clientHeight || 320;
      const chart = echarts.init(dom, 'dark', {width: w, height: h});
      chart.setOption({
        backgroundColor: 'transparent',
        ...result.chart_option,
      });
      chartInstances[containerId] = chart;
      new ResizeObserver(() => chart.resize()).observe(dom);
    });
  });
}

function renderTable(result, tabId, chartId) {
  const grid = document.getElementById('chartGrid');
  if (currentTab !== tabId) return;

  grid.classList.remove('empty');
  const emptyEl = grid.querySelector('.empty-state');
  if (emptyEl) emptyEl.remove();

  const card = document.createElement('div');
  card.className = 'chart-card';
  card.dataset.audit = escapeAttr(JSON.stringify(result.audit || {}));
  card.__chartData = result;
  card.__chartId = chartId || null;

  const data = result.data;
  const keys = Object.keys(data[0] || {});
  let tableHtml = '<table><thead><tr>';
  keys.forEach(k => tableHtml += `<th>${escapeHtml(k)}</th>`);
  tableHtml += '</tr></thead><tbody>';
  data.forEach(row => {
    tableHtml += '<tr>';
    keys.forEach(k => tableHtml += `<td>${escapeHtml(String(row[k] ?? ''))}</td>`);
    tableHtml += '</tr>';
  });
  tableHtml += '</tbody></table>';

  card.innerHTML = `
    <div class="table-container">${tableHtml}</div>
    <div class="card-footer">
      <div class="summary">${escapeHtml(result.summary || '')}</div>
      <div class="actions">
        <button onclick="showAuditFromCard(this)">审计</button>
        <button class="danger" onclick="removeCard(this)">删除</button>
      </div>
    </div>
  `;

  grid.prepend(card);

  card.addEventListener('contextmenu', e => {
    e.preventDefault();
    contextAudit = card.__chartData?.audit || null;
    contextCard = card;
    const menu = document.getElementById('contextMenu');
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
    menu.classList.add('show');
  });
}

// --- Audit from card button ---
function showAuditFromCard(btn) {
  const card = btn.closest('.chart-card');
  contextAudit = card.__chartData?.audit || null;
  contextCard = card;
  showAuditFromContext();
}

// --- Persist chart to server ---
function persistChart(dashboardName, chartData, onSaved) {
  fetch('/api/dashboards', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({dashboard_name: dashboardName, chart: chartData})
  }).then(r => r.json()).then(data => {
    if (dashboardName === TEMP_DASHBOARD && data.dashboard_id) {
      tempDashboardId = data.dashboard_id;
    }
    loadDashboards();
    if (onSaved) onSaved(data);
  }).catch(() => {});
}

// --- Pin to Dashboard ---
function pinChart(btn) {
  const result = JSON.parse(btn.dataset.result);
  const name = prompt('保存到 Dashboard (输入名称):', '默认');
  if (!name) return;
  persistChart(name, result);
  btn.textContent = '已保存 ✓';
  btn.disabled = true;
}

function pinFromCard(btn) {
  const card = btn.closest('.chart-card');
  const audit = JSON.parse(card.dataset.audit || '{}');
  const summary = card.querySelector('.summary')?.textContent || '';
  const chartData = card.__chartData || { audit, summary };
  const name = prompt('保存到 Dashboard (输入名称):', '默认');
  if (!name) return;
  persistChart(name, chartData);
}

function removeCard(btn) {
  const card = btn.closest('.chart-card');
  const chartId = card.__chartId;
  const dashId = (currentTab === 'temp') ? tempDashboardId : currentTab;
  card.remove();
  // Delete from server
  if (dashId && chartId) {
    fetch(`/api/dashboards/${dashId}/charts/${chartId}`, {method: 'DELETE'}).catch(() => {});
    loadDashboards();
  }
}

// --- Dashboard Tabs ---
async function loadDashboards() {
  try {
    const r = await fetch('/api/dashboards');
    const data = await r.json();
    const tabsEl = document.getElementById('dashTabs');
    tabsEl.innerHTML = '';
    data.forEach(d => {
      dashboards[d.id] = d;
      // Track temp dashboard id
      if (d.name === TEMP_DASHBOARD) {
        tempDashboardId = d.id;
        return; // Don't show __temp__ as a tab
      }
      const tab = document.createElement('div');
      tab.className = 'tab' + (currentTab === d.id ? ' active' : '');
      tab.dataset.dash = d.id;
      tab.textContent = `${d.name} (${d.charts?.length || 0})`;
      tab.onclick = () => switchTab(d.id);
      tabsEl.appendChild(tab);
    });
  } catch(e) {}
}

function switchTab(tabId) {
  currentTab = tabId;
  document.querySelectorAll('.dashboard-tabs .tab').forEach(t => {
    t.classList.toggle('active', t.dataset.dash === tabId);
  });

  const grid = document.getElementById('chartGrid');
  grid.innerHTML = '';
  Object.values(chartInstances).forEach(c => c.dispose());
  chartInstances = {};

  const showEmpty = (msg) => {
    grid.classList.add('empty');
    grid.innerHTML = `<div class="empty-state"><div class="icon">📊</div><p>${msg}</p></div>`;
  };

  if (tabId === 'temp') {
    const dash = dashboards[tempDashboardId];
    if (dash && dash.charts && dash.charts.length > 0) {
      grid.classList.remove('empty');
      dash.charts.forEach(c => {
        if (c.chart_option) renderChart(c, 'temp', c.id);
        else if (c.chart_type === 'table' && c.data?.length) renderTable(c, 'temp', c.id);
      });
      if (grid.children.length === 0) showEmpty('在左侧输入问题或点击快捷指标<br>图表将显示在这里');
    } else {
      showEmpty('在左侧输入问题或点击快捷指标<br>图表将显示在这里');
    }
  } else {
    const dash = dashboards[tabId];
    if (dash && dash.charts && dash.charts.length > 0) {
      grid.classList.remove('empty');
      dash.charts.forEach(c => {
        if (c.chart_option) renderChart(c, tabId, c.id);
        else if (c.chart_type === 'table' && c.data?.length) renderTable(c, tabId, c.id);
      });
      if (grid.children.length === 0) showEmpty('Dashboard 暂无图表');
    } else {
      showEmpty('Dashboard 暂无图表');
    }
  }
}

function createDashboard() {
  const name = prompt('新 Dashboard 名称:');
  if (!name) return;
  fetch('/api/dashboards', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({dashboard_name: name, chart: {summary: 'empty'}})
  }).then(r => r.json()).then(data => {
    loadDashboards();
    // Switch to new tab
    setTimeout(() => switchTab(data.dashboard_id), 500);
  });
}

// --- Audit Modal ---
function showAuditFromContext() {
  document.getElementById('contextMenu').classList.remove('show');
  if (!contextAudit && contextCard) {
    contextAudit = contextCard.__chartData?.audit || null;
  }
  if (!contextAudit) {
    alert('该图表无审计数据');
    return;
  }

  const a = contextAudit;
  let html = '';

  // Data source
  html += `<div class="audit-section"><h3>数据来源</h3><div class="info-grid">`;
  html += `<span class="label">文件</span><span>${a.data_source?.file || '-'}</span>`;
  html += `<span class="label">表</span><span>${a.data_source?.table || '-'}</span>`;
  html += `<span class="label">扫描行数</span><span>${a.data_source?.total_rows_scanned?.toLocaleString() || '-'}</span>`;
  html += `<span class="label">日期范围</span><span>${a.data_source?.date_range?.join(' ~ ') || '-'}</span>`;
  html += `</div></div>`;

  // SQL + Chinese explanation
  html += `<div class="audit-section"><h3>计算逻辑</h3>`;
  if (a.calculation_logic) html += `<p style="font-size:13px;margin-bottom:8px;color:var(--text)">${escapeHtml(a.calculation_logic)}</p>`;
  if (a.sql_explanation) html += `<p style="font-size:13px;margin-bottom:8px;color:var(--blue)">说明：${escapeHtml(a.sql_explanation)}</p>`;
  html += `<details style="margin-top:6px"><summary style="cursor:pointer;color:var(--text2);font-size:12px">查看原始 SQL</summary>`;
  html += `<pre style="margin-top:6px">${escapeHtml(a.sql || '')}</pre></details></div>`;

  // Columns used — show raw Excel column names and sample values
  if (a.columns_used?.length) {
    html += `<div class="audit-section"><h3>使用字段</h3><table><tr><th>原始表头</th><th>业务含义</th><th>角色</th><th>示例值</th></tr>`;
    a.columns_used.forEach(c => {
      const rawCol = c.raw_column ? `<code>${escapeHtml(c.raw_column)}</code>` : `<code>${escapeHtml(c.column)}</code>`;
      const logic = c.raw_logic ? `<br><span style="color:var(--orange);font-size:11px">${escapeHtml(c.raw_logic)}</span>` : '';
      const samples = c.sample_values ? c.sample_values.map(v => escapeHtml(v)).join(', ') : '-';
      html += `<tr><td>${rawCol}</td><td>${escapeHtml(c.business_name)}${logic}</td><td>${c.role}</td><td style="max-width:200px;word-break:break-all;font-size:11px;color:var(--text2)">${samples}</td></tr>`;
    });
    html += `</table></div>`;
  }

  // Metrics
  if (a.metrics_involved?.length) {
    html += `<div class="audit-section"><h3>关联指标</h3><table><tr><th>指标</th><th>名称</th><th>计算方式</th></tr>`;
    a.metrics_involved.forEach(m => {
      html += `<tr><td>${escapeHtml(m.metric)}</td><td>${escapeHtml(m.business_name)}</td><td>${escapeHtml(m.formula_human || m.formula || '')}</td></tr>`;
    });
    html += `</table></div>`;
  }

  // Filters — show Chinese first, raw SQL collapsed
  if (a.filters_applied?.length || a.filters_human?.length) {
    html += `<div class="audit-section"><h3>筛选条件</h3>`;
    if (a.filters_human?.length) {
      html += `<p style="font-size:13px;color:var(--text)">${a.filters_human.map(f => escapeHtml(f)).join('；')}</p>`;
    }
    if (a.filters_applied?.length) {
      html += `<details style="margin-top:6px"><summary style="cursor:pointer;color:var(--text2);font-size:12px">查看原始条件</summary>`;
      html += `<pre style="margin-top:6px">${a.filters_applied.map(f => escapeHtml(f)).join('\n')}</pre></details>`;
    }
    html += `</div>`;
  }

  // Sample data
  if (a.sample_data?.length) {
    const keys = Object.keys(a.sample_data[0]);
    html += `<div class="audit-section"><h3>样本数据</h3><table><tr>`;
    keys.forEach(k => html += `<th>${escapeHtml(k)}</th>`);
    html += `</tr>`;
    a.sample_data.forEach(row => {
      html += '<tr>';
      keys.forEach(k => html += `<td>${escapeHtml(String(row[k] ?? ''))}</td>`);
      html += '</tr>';
    });
    html += `</table></div>`;
  }

  document.getElementById('auditBody').innerHTML = html;
  document.getElementById('auditModal').classList.add('show');
}

function closeAudit() {
  document.getElementById('auditModal').classList.remove('show');
}

document.getElementById('auditModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeAudit();
});

// --- Helpers ---
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(str) {
  return escapeHtml(str);
}
