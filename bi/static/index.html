<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rednote BI</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  /* ═══ Ferrari Design System ═══ */
  :root {
    --bg: #000000;
    --surface: #303030;
    --surface2: #1a1a1a;
    --border: #444444;
    --text: #FFFFFF;
    --text2: #8F8F8F;
    --accent: #DA291C;
    --accent-hover: #B01E0A;
    --green: #00C9A7;
    --blue: #4C98B9;
    --orange: #F6E500;
    --near-black: #181818;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'FerrariSans', Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .header h1 span { color: var(--accent); }
  .header .meta {
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: Arial, Helvetica, sans-serif;
  }
  .header .clear-btn {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text2);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: Arial, Helvetica, sans-serif;
  }
  .header .clear-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Main layout ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── Chat panel — dark cinematic section ── */
  .chat-panel {
    width: 380px;
    min-width: 320px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }
  .chat-messages { flex: 1; overflow-y: auto; padding: 20px 16px; }
  .chat-msg { margin-bottom: 20px; }
  .chat-msg .role {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    font-family: Arial, Helvetica, sans-serif;
  }
  .chat-msg .role.user { color: var(--text); }
  .chat-msg .role.ai { color: var(--green); }
  .chat-msg .content { font-size: 14px; line-height: 1.5; color: var(--text); }
  .chat-msg pre {
    background: var(--surface);
    padding: 10px 14px;
    border-radius: 2px;
    font-size: 12px;
    overflow-x: auto;
    margin: 10px 0;
    color: var(--text2);
    font-family: 'Courier New', monospace;
  }
  .chat-msg .pin-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 12px 10px;
    background: var(--text);
    color: var(--bg);
    border: 1px solid var(--text);
    border-radius: 2px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .chat-msg .pin-btn:hover { background: var(--accent-hover); color: var(--text); border-color: var(--accent-hover); }

  /* ── Clarification options ── */
  .clarification-options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .clarify-btn {
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text);
    transition: all 0.15s;
    text-align: left;
  }
  .clarify-btn:hover { border-color: var(--accent); color: var(--accent); }
  .clarify-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Reasoning block (collapsible) ── */
  .reasoning-block {
    margin: 10px 0;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--near-black);
  }
  .reasoning-summary {
    padding: 8px 12px;
    cursor: pointer;
    font-size: 11px;
    color: var(--text2);
    font-family: Arial, Helvetica, sans-serif;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    justify-content: space-between;
  }
  .reasoning-summary:hover { color: var(--text); }
  .reasoning-status { color: var(--accent); font-weight: 700; }
  .reasoning-content {
    padding: 10px 12px;
    font-size: 12px;
    color: var(--text2);
    font-family: 'Courier New', monospace;
    white-space: pre-wrap;
    max-height: 300px;
    overflow-y: auto;
    line-height: 1.4;
    border-top: 1px solid var(--border);
  }
  /* ── Toast notification ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 24px;
    background: var(--accent);
    color: #fff;
    border-radius: 2px;
    font-size: 14px;
    font-weight: 500;
    z-index: 9999;
    animation: toastIn 0.3s ease;
  }
  .toast-success { background: var(--green); }
  .toast-error { background: var(--accent); }
  .toast-fade { opacity: 0; transform: translateX(-50%) translateY(10px); }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } }

  /* ── Pin Dialog ── */
  .pin-dialog-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pin-dialog {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 360px;
    max-height: 80vh;
    overflow: hidden;
  }
  .pin-dialog-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .pin-dialog-header button {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 18px;
    cursor: pointer;
  }
  .pin-dialog-header button:hover { color: var(--text); }
  .pin-dialog-body { padding: 20px; }
  .pin-dialog-section { margin-bottom: 20px; }
  .pin-dialog-section label {
    display: block;
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .pin-dashboard-list { display: flex; flex-direction: column; gap: 8px; }
  .pin-dashboard-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pin-dashboard-item:hover { border-color: var(--accent); background: var(--near-black); }
  .pin-count { font-size: 11px; color: var(--text2); }
  .pin-empty { padding: 12px; color: var(--text2); text-align: center; font-size: 13px; }
  .pin-new-input {
    width: 100%;
    padding: 12px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-size: 14px;
    margin-bottom: 10px;
    outline: none;
  }
  .pin-new-input:focus { border-color: var(--accent); }
  .pin-new-btn {
    width: 100%;
    padding: 12px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 2px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .pin-new-btn:hover { background: var(--accent-hover); }

  /* ── Quick metrics ── */
  .quick-metrics { padding: 14px 16px; border-top: 1px solid var(--border); }
  .quick-metrics label {
    font-size: 11px;
    color: var(--text2);
    display: block;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: Arial, Helvetica, sans-serif;
  }
  .quick-metrics .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .quick-metrics .tag {
    padding: 6px 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.15s;
  }
  .quick-metrics .tag:hover { border-color: var(--text); color: var(--text); }

  /* ── Input area ── */
  .chat-input { display: flex; padding: 14px 16px; border-top: 1px solid var(--border); gap: 8px; }
  .chat-input input {
    flex: 1;
    padding: 12px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-size: 14px;
    font-family: Arial, Helvetica, sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  .chat-input input::placeholder { color: #666666; }
  .chat-input input:focus { border-color: var(--text); }
  .chat-input button {
    padding: 12px 20px;
    background: var(--accent);
    color: var(--text);
    border: none;
    border-radius: 2px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
    transition: background 0.15s;
  }
  .chat-input button:hover { background: var(--accent-hover); }
  .chat-input button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Dashboard area — light editorial section ── */
  .dashboard-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .dashboard-tabs {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 8px;
    overflow-x: auto;
  }
  #dashTabs { display: flex; gap: 8px; }
  .dashboard-tabs .tab {
    padding: 8px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.15s;
  }
  .dashboard-tabs .tab:hover { border-color: var(--text); color: var(--text); }
  .dashboard-tabs .tab.active {
    background: var(--accent);
    color: var(--text);
    border-color: var(--accent);
  }
  .dashboard-tabs .tab-new {
    padding: 8px 12px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 2px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.15s;
  }
  .dashboard-tabs .tab-new:hover { border-color: var(--text); color: var(--text); }

  /* ── Chart grid ── */
  .chart-grid {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
    grid-auto-rows: auto;
    gap: 16px;
    align-content: start;
    background: var(--surface2);
  }
  .chart-grid.empty { display: flex; align-items: center; justify-content: center; }
  .empty-state { text-align: center; color: var(--text2); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  /* ── Chart card ── */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
    height: 400px;
    min-height: 400px;
    display: flex;
    flex-direction: column;
  }
  .chart-card .chart-container { width: 100%; flex: 1; min-height: 0; }
  .chart-card.wide {
    grid-column: 1 / -1;
    height: 420px;
    min-height: 420px;
  }
  .chart-card .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
  }
  .chart-card .card-footer .summary { font-size: 12px; color: var(--text2); flex: 1; }
  .chart-card .card-footer .actions { display: flex; gap: 6px; }
  .chart-card .card-footer .actions button {
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: Arial, Helvetica, sans-serif;
  }
  .chart-card .card-footer .actions button:hover { border-color: var(--text); color: var(--text); }
  .chart-card .card-footer .actions button.danger:hover { border-color: var(--accent); color: var(--accent); }
  .chart-card .table-container { padding: 12px; flex: 1; min-height: 0; overflow: auto; }
  .chart-card .table-container table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .chart-card .table-container th {
    text-align: left;
    padding: 8px 10px;
    background: var(--surface2);
    color: var(--text2);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    position: sticky;
    top: 0;
    font-family: Arial, Helvetica, sans-serif;
  }
  .chart-card .table-container td { padding: 8px 10px; border-bottom: 1px solid var(--border); }

  /* ── Audit modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: hsla(0, 0%, 7%, 0.8);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 640px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .modal-header h2 {
    font-size: 16px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .modal-header button {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 20px;
    cursor: pointer;
  }
  .modal-header button:hover { color: var(--text); }
  .modal-body { padding: 20px; }
  .modal-body .audit-section { margin-bottom: 24px; }
  .modal-body .audit-section h3 {
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 400;
  }
  .modal-body .audit-section .info-grid {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 6px 16px;
    font-size: 13px;
  }
  .modal-body .audit-section .info-grid .label { color: var(--text2); }
  .modal-body .audit-section pre {
    background: var(--surface2);
    padding: 12px 14px;
    border-radius: 2px;
    font-size: 12px;
    overflow-x: auto;
    color: var(--green);
    white-space: pre-wrap;
    font-family: 'Courier New', monospace;
  }
  .modal-body .audit-section table { width: 100%; font-size: 12px; border-collapse: collapse; }
  .modal-body .audit-section th {
    text-align: left;
    padding: 6px 8px;
    background: var(--surface2);
    color: var(--text2);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 400;
  }
  .modal-body .audit-section td { padding: 6px 8px; border-bottom: 1px solid var(--border); }

  /* ── Context menu ── */
  .context-menu {
    display: none;
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    z-index: 999;
    overflow: hidden;
  }
  .context-menu.show { display: block; }
  .context-menu .menu-item {
    padding: 10px 18px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text);
    transition: all 0.1s;
  }
  .context-menu .menu-item:hover { background: var(--surface2); color: var(--accent); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #444444; border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text2); }

  /* ── Loading spinner ── */
  .loading {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top: 2px solid var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ECharts dark theme overrides ── */
  /* Ensure chart text is readable on dark surface */
</style>
</head>
<body>

<!-- Header — Dark Surface bar -->
<div class="header">
  <h1><span>Rednote</span> BI</h1>
  <div class="meta" id="headerMeta">Loading...</div>
  <button class="clear-btn" onclick="clearHistory()">CLEAR</button>
</div>

<div class="main">
  <!-- Chat Panel — Absolute Black cinematic section -->
  <div class="chat-panel">
    <div class="chat-messages" id="chatMessages">
      <div class="chat-msg">
        <div class="role ai">AI ANALYST</div>
        <div class="content">欢迎使用 Rednote BI。你可以用自然语言提问，例如「每天的日活趋势」「各页面访问占比」「导航漏斗转化」</div>
      </div>
    </div>
    <div class="quick-metrics">
      <label>Quick Metrics</label>
      <div class="tags" id="quickTags">
        <span class="tag" data-q="每天的日活趋势">DAU</span>
        <span class="tag" data-q="各页面模块的事件占比">Pages</span>
        <span class="tag" data-q="每小时用户活跃分布">Hourly</span>
        <span class="tag" data-q="导航漏斗：浏览POI → 点击导航 → 确认导航">Funnel</span>
        <span class="tag" data-q="Top 10 热门事件">Top Events</span>
        <span class="tag" data-q="搜索关键词相关的用户行为">Search</span>
      </div>
    </div>
    <div class="chat-input">
      <input type="text" id="queryInput" placeholder="输入你的问题..." autofocus />
      <button id="sendBtn" onclick="sendQuery()">SEND</button>
    </div>
  </div>

  <!-- Dashboard Area — Dark Surface editorial section -->
  <div class="dashboard-area">
    <div class="dashboard-tabs">
      <div class="tab active" data-dash="temp" onclick="switchTab('temp')">TEMP</div>
      <div id="dashTabs"></div>
      <div class="tab-new" onclick="createDashboard()">+ NEW</div>
    </div>
    <div class="chart-grid empty" id="chartGrid">
      <div class="empty-state">
        <div class="icon">📊</div>
        <p>在左侧输入问题或点击快捷指标<br>图表将显示在这里</p>
      </div>
    </div>
  </div>
</div>

<!-- Audit Modal -->
<div class="modal-overlay" id="auditModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Chart Audit</h2>
      <button onclick="closeAudit()">&times;</button>
    </div>
    <div class="modal-body" id="auditBody"></div>
  </div>
</div>

<!-- Context Menu -->
<div class="context-menu" id="contextMenu">
  <div class="menu-item" onclick="showAuditFromContext()">审计详情</div>
</div>

<script>
// --- State ---
let currentTab = 'temp';
const TEMP_DASHBOARD = '__temp__';
let dashboards = {};
let contextAudit = null;
let contextCard = null;
let chartInstances = {};
let tempDashboardId = null;

// --- Clear History ---
function clearHistory() {
  // Clear chat messages
  const chatMessages = document.getElementById('chatMessages');
  chatMessages.innerHTML = `
    <div class="chat-msg">
      <div class="role ai">AI ANALYST</div>
      <div class="content">欢迎使用 Rednote BI。你可以用自然语言提问，例如「每天的日活趋势」「各页面访问占比」「导航漏斗转化」</div>
    </div>
  `;
  // Clear temp dashboard charts
  const chartGrid = document.getElementById('chartGrid');
  chartGrid.innerHTML = `<div class="empty-state"><div class="icon">📊</div><p>在左侧输入问题或点击快捷指标<br>图表将显示在这里</p></div>`;
  chartGrid.classList.add('empty');
}

// --- Init ---
document.addEventListener('DOMContentLoaded', async () => {
  loadDashboards();
  document.getElementById('queryInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendQuery();
  });
  document.querySelectorAll('.quick-metrics .tag').forEach(tag => {
    tag.addEventListener('click', () => {
      document.getElementById('queryInput').value = tag.dataset.q;
      sendQuery();
    });
  });
  document.addEventListener('click', () => {
    document.getElementById('contextMenu').classList.remove('show');
  });

  // Fetch meta
  try {
    const r = await fetch('/api/schema');
    const d = await r.json();
    const m = d.meta;
    document.getElementById('headerMeta').textContent =
      `${m.total_rows?.toLocaleString()} EVENTS · ${m.total_users?.toLocaleString()} USERS · ${m.event_types} EVENT TYPES · ${m.date_range?.[0]} ~ ${m.date_range?.[1]}`;
  } catch(e) {
    document.getElementById('headerMeta').textContent = 'CONNECTED';
  }
});

// --- Query ---
async function sendQuery() {
  const input = document.getElementById('queryInput');
  const question = input.value.trim();
  if (!question) return;
  input.value = '';

  addChatMsg('user', question);
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span>';

  // Create a placeholder for streaming response
  const streamMsgId = 'stream-' + Date.now();
  const streamDiv = document.createElement('div');
  streamDiv.className = 'chat-msg';
  streamDiv.id = streamMsgId;
  streamDiv.innerHTML = `
    <div class="role ai">AI ANALYST</div>
    <details class="reasoning-block" open>
      <summary class="reasoning-summary">推理过程 <span class="reasoning-status">...</span></summary>
      <div class="reasoning-content" id="${streamMsgId}-reasoning"></div>
    </details>
    <div class="content" id="${streamMsgId}-content"></div>
    <div class="chart-placeholder" id="${streamMsgId}-chart"></div>
  `;
  document.getElementById('chatMessages').appendChild(streamDiv);
  streamDiv.scrollIntoView({behavior: 'smooth'});

  let reasoningText = '';
  let contentText = '';
  let reasoningDiv = document.getElementById(`${streamMsgId}-reasoning`);
  let contentDiv = document.getElementById(`${streamMsgId}-content`);
  let statusSpan = streamDiv.querySelector('.reasoning-status');

  try {
    const r = await fetch('/api/query/stream', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question, clear_history: true})
    });

    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const dataStr = line.slice(6);
          try {
            const chunk = JSON.parse(dataStr);

            if (chunk.type === 'reasoning') {
              reasoningText += chunk.text;
              reasoningDiv.textContent = reasoningText;
              statusSpan.textContent = '思考中...';
              streamDiv.scrollIntoView({behavior: 'smooth'});
            } else if (chunk.type === 'content') {
              contentText += chunk.text;
              contentDiv.textContent = contentText;
              statusSpan.textContent = '生成SQL...';
            } else if (chunk.type === 'clarification') {
              // Remove streaming placeholder
              streamDiv.remove();
              // Show reasoning if any
              if (chunk.reasoning) {
                addChatMsg('ai', `[推理] ${chunk.reasoning.slice(0, 200)}...`);
              }
              addClarificationMsg(chunk);
              btn.disabled = false;
              btn.textContent = 'SEND';
              return;
            } else if (chunk.type === 'result') {
              statusSpan.textContent = '完成';
              reasoningDiv.textContent = chunk.reasoning || reasoningText;
              contentDiv.textContent = chunk.summary || '查询完成';
              // Remove chart-placeholder from chat - chart goes to dashboard
              streamDiv.querySelector('.chart-placeholder').remove();
              // Render chart to right-side dashboard (temp area)
              if (chunk.chart_option) {
                renderChart(chunk, 'temp');
                persistChart(TEMP_DASHBOARD, chunk, (savedData) => {
                  if (currentTab === 'temp' && savedData.chart_id) {
                    const cards = document.querySelectorAll('#chartGrid .chart-card');
                    if (cards.length > 0) cards[0].__chartId = savedData.chart_id;
                  }
                });
              } else if (chunk.data?.length) {
                renderTable(chunk, 'temp');
                persistChart(TEMP_DASHBOARD, chunk, (savedData) => {
                  if (currentTab === 'temp' && savedData.chart_id) {
                    const cards = document.querySelectorAll('#chartGrid .chart-card');
                    if (cards.length > 0) cards[0].__chartId = savedData.chart_id;
                  }
                });
              }
            } else if (chunk.type === 'error') {
              contentDiv.textContent = `错误: ${chunk.message}`;
              statusSpan.textContent = '失败';
            }
          } catch (parseErr) {
            console.warn('Parse error:', parseErr);
          }
        }
      }
    }

  } catch(e) {
    contentDiv.textContent = `请求失败: ${e.message}`;
    statusSpan.textContent = '失败';
  }

  btn.disabled = false;
  btn.textContent = 'SEND';
}

// Add clarification message with clickable options
function addClarificationMsg(clarification) {
  const div = document.createElement('div');
  div.className = 'chat-msg';
  let html = `<div class="role ai">AI ANALYST</div>`;
  html += `<div class="content">${escapeHtml(clarification.message)}</div>`;
  html += `<div class="clarification-options">`;
  clarification.options.forEach(opt => {
    const data = escapeAttr(JSON.stringify({
      value: opt.value,
      label: opt.label,
      original_question: clarification.original_question
    }));
    html += `<button class="clarify-btn" onclick="handleClarification(this)" data-info='${data}'>${escapeHtml(opt.label)}</button>`;

}

    const reader = r.body.getReader();

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, {stream: true});

      for (const line of lines) {

function addChatMsg(role, text, sql, result) {
  const div = document.createElement('div');
  div.className = 'chat-msg';
  let html = `<div class="role ${role}">${role === 'user' ? 'YOU' : 'AI ANALYST'}</div>`;
  html += `<div class="content">${escapeHtml(text)}</div>`;
  if (sql) {
    html += `<pre>${escapeHtml(sql)}</pre>`;
  }
  if (result && result.chart_option) {
    const btnId = 'pin-' + Date.now();
    html += `<button class="pin-btn" id="${btnId}" onclick="pinChart(this)" data-result='${escapeAttr(JSON.stringify(result))}'>PIN TO DASHBOARD</button>`;
  }
  div.innerHTML = html;
  document.getElementById('chatMessages').appendChild(div);
  div.scrollIntoView({behavior: 'smooth'});

  // Auto-persist and render in temp area
  if (result && result.chart_option) {
    persistChart(TEMP_DASHBOARD, result, (savedData) => {
      if (currentTab === 'temp') {
        const cards = document.querySelectorAll('#chartGrid .chart-card');
        if (cards.length > 0) cards[0].__chartId = savedData.chart_id;
      }
    });
    renderChart(result, 'temp');
  } else if (result && result.chart_type === 'table' && result.data?.length > 0) {
    persistChart(TEMP_DASHBOARD, result, (savedData) => {
      if (currentTab === 'temp') {
        const cards = document.querySelectorAll('#chartGrid .chart-card');
        if (cards.length > 0) cards[0].__chartId = savedData.chart_id;
      }
    });
    renderTable(result, 'temp');
  }
}

// --- Chart Rendering ---
function renderChart(result, tabId, chartId) {
  const grid = document.getElementById('chartGrid');
  if (currentTab !== tabId) return;

  grid.classList.remove('empty');
  const emptyEl = grid.querySelector('.empty-state');
  if (emptyEl) emptyEl.remove();

  const cardId = 'chart-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);
  const card = document.createElement('div');
  const isWide = ['funnel','pie','sankey'].includes(result.chart_type);
  card.className = 'chart-card' + (isWide ? ' wide' : '');
  card.dataset.audit = escapeAttr(JSON.stringify(result.audit || {}));

  const containerId = cardId + '-container';
  card.innerHTML = `
    <div class="chart-container" id="${containerId}"></div>
    <div class="card-footer">
      <div class="summary">${escapeHtml(result.summary || '')}</div>
      <div class="actions">
        <button onclick="showAuditFromCard(this)">AUDIT</button>
        <button onclick="pinFromCard(this)">PIN</button>
        <button class="danger" onclick="removeCard(this)">DEL</button>
      </div>
    </div>
  `;

  grid.prepend(card);

  card.__chartData = result;
  card.__chartId = chartId || null;

  // Context menu
  card.addEventListener('contextmenu', e => {
    e.preventDefault();
    contextAudit = card.__chartData?.audit || null;
    contextCard = card;
    const menu = document.getElementById('contextMenu');
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
    menu.classList.add('show');
  });

  // Init ECharts
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const dom = document.getElementById(containerId);
      if (!dom) return;
      const w = dom.clientWidth || 400;
      const h = dom.clientHeight || 320;
      const chart = echarts.init(dom, 'dark', {width: w, height: h});
      chart.setOption({
        backgroundColor: 'transparent',
        ...result.chart_option,
      });
      chartInstances[containerId] = chart;
      new ResizeObserver(() => chart.resize()).observe(dom);
    });
  });
}

function renderTable(result, tabId, chartId) {
  const grid = document.getElementById('chartGrid');
  if (currentTab !== tabId) return;

  grid.classList.remove('empty');
  const emptyEl = grid.querySelector('.empty-state');
  if (emptyEl) emptyEl.remove();

  const card = document.createElement('div');
  card.className = 'chart-card';
  card.dataset.audit = escapeAttr(JSON.stringify(result.audit || {}));
  card.__chartData = result;
  card.__chartId = chartId || null;

  const data = result.data;
  const keys = Object.keys(data[0] || {});
  let tableHtml = '<table><thead><tr>';
  keys.forEach(k => tableHtml += `<th>${escapeHtml(k)}</th>`);
  tableHtml += '</tr></thead><tbody>';
  data.forEach(row => {
    tableHtml += '<tr>';
    keys.forEach(k => tableHtml += `<td>${escapeHtml(String(row[k] ?? ''))}</td>`);
    tableHtml += '</tr>';
  });
  tableHtml += '</tbody></table>';

  card.innerHTML = `
    <div class="table-container">${tableHtml}</div>
    <div class="card-footer">
      <div class="summary">${escapeHtml(result.summary || '')}</div>
      <div class="actions">
        <button onclick="showAuditFromCard(this)">AUDIT</button>
        <button class="danger" onclick="removeCard(this)">DEL</button>
      </div>
    </div>
  `;

  grid.prepend(card);

  card.addEventListener('contextmenu', e => {
    e.preventDefault();
    contextAudit = card.__chartData?.audit || null;
    contextCard = card;
    const menu = document.getElementById('contextMenu');
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
    menu.classList.add('show');
  });
}

// --- Audit from card button ---
function showAuditFromCard(btn) {
  const card = btn.closest('.chart-card');
  contextAudit = card.__chartData?.audit || null;
  contextCard = card;
  showAuditFromContext();
}

// --- Persist chart to server ---
function persistChart(dashboardName, chartData, onSaved) {
  fetch('/api/dashboards', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({dashboard_name: dashboardName, chart: chartData})
  }).then(r => r.json()).then(data => {
    if (dashboardName === TEMP_DASHBOARD && data.dashboard_id) {
      tempDashboardId = data.dashboard_id;
    }
    loadDashboards();
    if (onSaved) onSaved(data);
  }).catch(err => {
    console.error('Persist chart failed:', err);
  });
}

// --- Pin to Dashboard with selection ---
function pinFromCard(btn) {
  const card = btn.closest('.chart-card');
  const chartData = card.__chartData || { audit: JSON.parse(card.dataset.audit || '{}') };
  showPinDialog(chartData);
}

function showPinDialog(chartData) {
  // Get existing dashboards
  fetch('/api/dashboards').then(r => r.json()).then(dashboards => {
    // Filter out __temp__
    const savedDashboards = dashboards.filter(d => d.name !== '__temp__');

    // Build selection dialog HTML
    const dialogHtml = `
      <div class="pin-dialog-overlay" onclick="closePinDialog()">
        <div class="pin-dialog" onclick="event.stopPropagation()">
          <div class="pin-dialog-header">
            <span>PIN TO DASHBOARD</span>
            <button onclick="closePinDialog()">&times;</button>
          </div>
          <div class="pin-dialog-body">
            <div class="pin-dialog-section">
              <label>选择已有看板:</label>
              <div class="pin-dashboard-list">
                ${savedDashboards.map(d => `
                  <div class="pin-dashboard-item" onclick="pinToDashboard('${d.name}', ${JSON.stringify(chartData).replace(/"/g, '&quot;')})">
                    <span>${d.name}</span>
                    <span class="pin-count">${d.charts?.length || 0} 图表</span>
                  </div>
                `).join('')}
                ${savedDashboards.length === 0 ? '<div class="pin-empty">暂无已保存的看板</div>' : ''}
              </div>
            </div>
            <div class="pin-dialog-section">
              <label>或新建看板:</label>
              <input type="text" class="pin-new-input" id="pinNewName" placeholder="输入新看板名称" />
              <button class="pin-new-btn" onclick="pinToNewDashboard(${JSON.stringify(chartData).replace(/"/g, '&quot;')})">新建并保存</button>
            </div>
          </div>
        </div>
      </div>
    `;

    // Add dialog to body
    const dialogDiv = document.createElement('div');
    dialogDiv.id = 'pinDialogContainer';
    dialogDiv.innerHTML = dialogHtml;
    document.body.appendChild(dialogDiv);
  });
}

function pinToDashboard(name, chartData) {
  persistChart(name, chartData, () => {
    closePinDialog();
    showToast(`已保存到「${name}」看板`);
  });
}

function pinToNewDashboard(chartData) {
  const name = document.getElementById('pinNewName').value.trim();
  if (!name) {
    showToast('请输入看板名称', 'error');
    return;
  }
  persistChart(name, chartData, () => {
    closePinDialog();
    showToast(`已创建「${name}」看板并保存`);
  });
}

function closePinDialog() {
  const dialog = document.getElementById('pinDialogContainer');
  if (dialog) dialog.remove();
}

function showToast(message, type = 'success') {
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('toast-fade');
    setTimeout(() => toast.remove(), 300);
  }, 2000);
}

function removeCard(btn) {
  const card = btn.closest('.chart-card');
  const chartId = card.__chartId;
  const dashId = (currentTab === 'temp') ? tempDashboardId : currentTab;
  card.remove();
  if (dashId && chartId) {
    fetch(`/api/dashboards/${dashId}/charts/${chartId}`, {method: 'DELETE'}).catch(() => {});
    loadDashboards();
  }
}

// --- Dashboard Tabs ---
async function loadDashboards() {
  try {
    const r = await fetch('/api/dashboards');
    const data = await r.json();
    const tabsEl = document.getElementById('dashTabs');
    tabsEl.innerHTML = '';
    data.forEach(d => {
      dashboards[d.id] = d;
      if (d.name === TEMP_DASHBOARD) {
        tempDashboardId = d.id;
        return;
      }
      const tab = document.createElement('div');
      tab.className = 'tab' + (currentTab === d.id ? ' active' : '');
      tab.dataset.dash = d.id;
      tab.textContent = `${d.name.toUpperCase()} (${d.charts?.length || 0})`;
      tab.onclick = () => switchTab(d.id);
      tabsEl.appendChild(tab);
    });
  } catch(e) {}
}

function switchTab(tabId) {
  currentTab = tabId;
  document.querySelectorAll('.dashboard-tabs .tab').forEach(t => {
    t.classList.toggle('active', t.dataset.dash === tabId);
  });

  const grid = document.getElementById('chartGrid');
  grid.innerHTML = '';
  Object.values(chartInstances).forEach(c => c.dispose());
  chartInstances = {};

  const showEmpty = (msg) => {
    grid.classList.add('empty');
    grid.innerHTML = `<div class="empty-state"><div class="icon">📊</div><p>${msg}</p></div>`;
  };

  if (tabId === 'temp') {
    const dash = dashboards[tempDashboardId];
    if (dash && dash.charts && dash.charts.length > 0) {
      grid.classList.remove('empty');
      dash.charts.forEach(c => {
        if (c.chart_option) renderChart(c, 'temp', c.id);
        else if (c.chart_type === 'table' && c.data?.length) renderTable(c, 'temp', c.id);
      });
      if (grid.children.length === 0) showEmpty('在左侧输入问题或点击快捷指标<br>图表将显示在这里');
    } else {
      showEmpty('在左侧输入问题或点击快捷指标<br>图表将显示在这里');
    }
  } else {
    const dash = dashboards[tabId];
    if (dash && dash.charts && dash.charts.length > 0) {
      grid.classList.remove('empty');
      dash.charts.forEach(c => {
        if (c.chart_option) renderChart(c, tabId, c.id);
        else if (c.chart_type === 'table' && c.data?.length) renderTable(c, tabId, c.id);
      });
      if (grid.children.length === 0) showEmpty('Dashboard 暂无图表');
    } else {
      showEmpty('Dashboard 暂无图表');
    }
  }
}

function createDashboard() {
  const name = prompt('新 Dashboard 名称:');
  if (!name) return;
  fetch('/api/dashboards', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({dashboard_name: name, chart: {summary: 'empty'}})
  }).then(r => r.json()).then(data => {
    loadDashboards();
    setTimeout(() => switchTab(data.dashboard_id), 500);
  });
}

// --- Audit Modal ---
function showAuditFromContext() {
  document.getElementById('contextMenu').classList.remove('show');
  if (!contextAudit && contextCard) {
    contextAudit = contextCard.__chartData?.audit || null;
  }
  if (!contextAudit) {
    alert('该图表无审计数据');
    return;
  }

  const a = contextAudit;
  let html = '';

  // Data source
  html += `<div class="audit-section"><h3>Data Source</h3><div class="info-grid">`;
  html += `<span class="label">文件</span><span>${a.data_source?.file || '-'}</span>`;
  html += `<span class="label">表</span><span>${a.data_source?.table || '-'}</span>`;
  html += `<span class="label">扫描行数</span><span>${a.data_source?.total_rows_scanned?.toLocaleString() || '-'}</span>`;
  html += `<span class="label">日期范围</span><span>${a.data_source?.date_range?.join(' ~ ') || '-'}</span>`;
  html += `</div></div>`;

  // SQL + Chinese explanation
  html += `<div class="audit-section"><h3>Calculation Logic</h3>`;
  if (a.calculation_logic) html += `<p style="font-size:13px;margin-bottom:8px;color:var(--text)">${escapeHtml(a.calculation_logic)}</p>`;
  if (a.sql_explanation) html += `<p style="font-size:13px;margin-bottom:8px;color:var(--blue)">说明：${escapeHtml(a.sql_explanation)}</p>`;
  html += `<details style="margin-top:6px"><summary style="cursor:pointer;color:var(--text2);font-size:12px">查看原始 SQL</summary>`;
  html += `<pre style="margin-top:6px">${escapeHtml(a.sql || '')}</pre></details></div>`;

  // Columns used
  if (a.columns_used?.length) {
    html += `<div class="audit-section"><h3>Fields Used</h3><table><tr><th>Raw Column</th><th>Meaning</th><th>Role</th><th>Sample</th></tr>`;
    a.columns_used.forEach(c => {
      const rawCol = c.raw_column ? `<code>${escapeHtml(c.raw_column)}</code>` : `<code>${escapeHtml(c.column)}</code>`;
      const logic = c.raw_logic ? `<br><span style="color:var(--orange);font-size:11px">${escapeHtml(c.raw_logic)}</span>` : '';
      const samples = c.sample_values ? c.sample_values.map(v => escapeHtml(v)).join(', ') : '-';
      html += `<tr><td>${rawCol}</td><td>${escapeHtml(c.business_name)}${logic}</td><td>${c.role}</td><td style="max-width:200px;word-break:break-all;font-size:11px;color:var(--text2)">${samples}</td></tr>`;
    });
    html += `</table></div>`;
  }

  // Metrics
  if (a.metrics_involved?.length) {
    html += `<div class="audit-section"><h3>Metrics</h3><table><tr><th>Metric</th><th>Name</th><th>Formula</th></tr>`;
    a.metrics_involved.forEach(m => {
      html += `<tr><td>${escapeHtml(m.metric)}</td><td>${escapeHtml(m.business_name)}</td><td>${escapeHtml(m.formula_human || m.formula || '')}</td></tr>`;
    });
    html += `</table></div>`;
  }

  // Filters
  if (a.filters_applied?.length || a.filters_human?.length) {
    html += `<div class="audit-section"><h3>Filters</h3>`;
    if (a.filters_human?.length) {
      html += `<p style="font-size:13px;color:var(--text)">${a.filters_human.map(f => escapeHtml(f)).join('；')}</p>`;
    }
    if (a.filters_applied?.length) {
      html += `<details style="margin-top:6px"><summary style="cursor:pointer;color:var(--text2);font-size:12px">查看原始条件</summary>`;
      html += `<pre style="margin-top:6px">${a.filters_applied.map(f => escapeHtml(f)).join('\n')}</pre></details>`;
    }
    html += `</div>`;
  }

  // Sample data
  if (a.sample_data?.length) {
    const keys = Object.keys(a.sample_data[0]);
    html += `<div class="audit-section"><h3>Sample Data</h3><table><tr>`;
    keys.forEach(k => html += `<th>${escapeHtml(k)}</th>`);
    html += `</tr>`;
    a.sample_data.forEach(row => {
      html += '<tr>';
      keys.forEach(k => html += `<td>${escapeHtml(String(row[k] ?? ''))}</td>`);
      html += '</tr>';
    });
    html += `</table></div>`;
  }

  document.getElementById('auditBody').innerHTML = html;
  document.getElementById('auditModal').classList.add('show');
}

function closeAudit() {
  document.getElementById('auditModal').classList.remove('show');
}

document.getElementById('auditModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeAudit();
});

// --- Helpers ---
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(str) {
  return escapeHtml(str);
}
</script>
</body>
</html>
